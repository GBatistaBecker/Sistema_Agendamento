<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link rel="stylesheet" href="/styles/servicos.css" />
  <link href="https://fonts.googleapis.com/css2?family=Frijole&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles/servicos.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  
</head>

<body>

<header class="text-center p-4">
  <img src="/imagens/pitbull-logo-branco.png" alt="Logo" class="logo">
  <h1 style="color: whitesmoke;">Bem-vindo! O que deseja fazer?</h1>
</header>

<main class="container d-flex justify-content-center align-items-center" style="min-height:60vh;">
  <div class="d-flex gap-5 flex-wrap justify-content-center">

    <div class="dashboard-card" data-bs-toggle="modal" data-bs-target="#modalHistorico">
      <h2> Histórico </h2>
      <p>Visualize e gerencie seus agendamentos</p>
    </div>

    <div class="dashboard-card" data-bs-toggle="modal" data-bs-target="#modalAgendamento">
      <h2> Novo Agendamento </h2>
      <p>Agende seu próximo corte rapidamente</p>
    </div>

  </div>
</main>

<!-- MODAL HISTÓRICO -->
<div class="modal fade" id="modalHistorico" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Seu Histórico</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <ul id="listaAgendamentos" class="list-unstyled"></ul>
      </div>
    </div>
  </div>
</div>

<!-- MODAL AGENDAMENTO -->
<div class="modal fade" id="modalAgendamento" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">Novo Agendamento</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <!-- Indicador de etapas -->
        <div class="step-indicator">
          <div class="step active" id="step1">1 Serviço</div>
          <div class="step" id="step2">2 Data</div>
          <div class="step" id="step3">3 Horário</div>
        </div>

        <!-- ETAPA 1 -->
        <div id="etapaServico">
          <div class="row g-3 justify-content-center">
            <div class="col-md-4"
                 th:each="servico : ${servicos}">
              <div class="servico-card servico-selecao-card text-center p-3"
                   th:attr="data-id-servico=${servico.idCorte}">
                <p class="titulo" th:text="${servico.nomeCorte}"></p>
                <p class="preco" th:text="'R$ ' + ${servico.valorCorte}"></p>
                <span class="tempo" th:text="'Duração: ' + ${servico.duracaoCorte} + ' minutos'"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- ETAPA 2 -->
        <div id="etapaData" class="fade-section mt-4">
          <div class="text-center">
            <input type="date" id="inputData" class="form-control w-50 mx-auto">
          </div>
        </div>

        <!-- ETAPA 3 -->
        <div id="etapaHorario" class="fade-section mt-4">
          <div id="lista-horas" class="d-flex flex-wrap gap-3 justify-content-center"></div>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-success" id="btnConfirmarAgendamento" disabled>
          Confirmar Agendamento
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Modal Confirmar Exclusão (mantido) -->
<div class="modal fade" id="modalConfirmarExclusao" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-body">
        Deseja realmente excluir este agendamento?
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" id="btnConfirmarExclusao">Excluir</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Sucesso (mantido) -->
<div class="modal fade" id="modalSucesso" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">Agendamento Realizado</h5>
      </div>
      <div class="modal-body" id="mensagemModal"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-success" data-bs-dismiss="modal">OK</button>
      </div>
    </div>
  </div>
</div>

  <div id="map" class="map"></div>

  <script>
    const coordenadas = [-28.425856364663854, -48.960435218019235];

    const map = L.map('map').setView(coordenadas, 15); 

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    L.marker(coordenadas).addTo(map)
      .openPopup();
  </script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/script/servicoScript.js"></script>

</body>
</html>
