<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Pitbull Barber</title>
  <link rel="stylesheet" href="/styles/style.css" />
  
</head>
<body class="center">

  <div id="success-message" style="display:none;"
       th:if="${sucessoCadastro}"
       th:text="${sucessoCadastro}">
  </div>
  
  <div class="login-container">
    <img src="/imagens/pitbull-logo-branco.png" alt="Logo Pitbull Barber" class="login-logo"/>
    <form id="login-form" method="post" action="/barbearia/login">
    
      <div id="server-error-message" style="display:none;"
           th:if="${erroTelefone} or ${erroTelefoneExistente} or ${erroNaoEncontrado}"
           th:text="${erroTelefone ?: erroTelefoneExistente ?: erroNaoEncontrado}">
      </div>

      <input type="email" id="emailUsuario" name="emailUsuario" placeholder="Email" required autocomplete="off" />
      <input type="password" id="senhaUsuario" name="senhaUsuario" placeholder="Senha" required autocomplete="off"/>
      <!-- atento ao autocomplete ou entao o cache do navegador -->
      
      <p class="cadastro-link" style="color: #ccc;">
        Ainda não tem cadastro? 
        <a href="/barbearia/cadastro" style="color: #ffffff;">Clique aqui</a>
      </p>
      
      <button type="submit">Entrar</button>
    </form>

  <script src="/script/loginScript.js"></script>
</body>
</html>
