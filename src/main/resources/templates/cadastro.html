<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - Pitbull Barber</title>
  <link rel="stylesheet" href="/styles/style.css" />
</head>
<body class="center">
  <div class="cadastro-container">
    <img src="/imagens/pitbull-logo-branco.png" alt="Logo Pitbull Barber" class="login-logo"/>
    <form id="cadastro-form" method="post" action="/barbearia/cadastro">
      <input type="text" id="nomeCliente" name="nomeCliente" placeholder="Nome" required />
      <input type="tel" id="telefoneCliente" name="telefoneCliente" placeholder="Telefone" maxlength="15" required />
      <input type="email" id="emailCliente" name="emailCliente" placeholder="seu@email.com" required/>
      <input type="password" id="senhaUsuario" name="senhaUsuario" placeholder="Senha" minlength="8" required/>
        <p class="cadastro-link" style="color: #ccc;">
          Já possui uma conta? 
        <a href="/barbearia/login" style="color: #B22222;">Clique aqui</a>
      </p>
      <button type="submit" >Cadastre-se</button>
    </form>

  </div>
  <a href="https://wa.me/5548998348321?text=Olá,%20gostaria%20de%20uma%20ajuda%20com%20o%20agendamento%20da%20barbearia." 
     class="whatsapp-float" 
     target="_blank"
     aria-label="Fale conosco no WhatsApp">
      
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" 
           alt="WhatsApp">
  </a>
  <script src="/script/cadastroScript.js"></script>
</body>
</html>
